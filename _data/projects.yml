- name: "Todo CLI"
  description: "一个用 Python 编写的命令行待办事项工具，支持添加、删除、标记完成、按优先级排序等功能，数据存储在本地 JSON 文件中。"
  tech: ["Python", "Click", "JSON"]
  github: "https://github.com/W-JOSLIN-X/todo-cli"
  demo: ""
  featured: false

