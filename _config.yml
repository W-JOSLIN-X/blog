# 站点设置
title: 个人博客
description: 记录技术、生活与思考
author: HPPP
email: 3044779172@qq.com
lang: zh-CN
timezone: Asia/Shanghai

# GitHub Pages 设置
baseurl: "" # 如果是项目站点，改为 /项目名
url: "https://haop11.github.io" # 替换为你的 GitHub Pages URL

# 全站统一背景图
bg_image: "/assets/images/bg.jpg"

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# 默认 Front Matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
