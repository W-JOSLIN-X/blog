# 站点设置
title: 我的个人博客
description: 记录技术、生活与思考
author: 博主
email: your-email@example.com
lang: zh-CN
timezone: Asia/Shanghai

# GitHub Pages 设置
baseurl: "" # 如果是项目站点，改为 /项目名
url: "https://haop11.github.io" # 替换为你的 GitHub Pages URL

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: /:year/:month/:day/:title/

# 分页（可选）
paginate: 5
paginate_path: "/page/:num/"

# 默认 Front Matter
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: post
  - scope:
      path: ""
    values:
      layout: default

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
