---
layout: default
title: 画廊
---

<div class="pg-head reveal">
  <h1 class="pg-head__title">画廊</h1>
  <p class="pg-head__sub">用镜头记录生活的每一个瞬间</p>
</div>

<div class="filter-bar reveal">
  <button class="filter-btn is-active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="风景">风景</button>
  <button class="filter-btn" data-filter="城市">城市</button>
  <button class="filter-btn" data-filter="旅行">旅行</button>
  <button class="filter-btn" data-filter="自然">自然</button>
  <button class="filter-btn" data-filter="生活">生活</button>
  <button class="filter-btn" data-filter="动物">动物</button>
</div>

<div class="gallery reveal" id="photos-grid">
  {% for photo in site.data.photos %}
  <div class="gallery__item" data-category="{{ photo.category }}" data-title="{{ photo.title }}" data-desc="{{ photo.desc }}">
    <img src="{{ photo.url | relative_url }}" alt="{{ photo.title }}" loading="lazy">
    <div class="gallery__ph">&#x1f5bc;</div>
    <div class="gallery__overlay"><span>{{ photo.title }}</span></div>
  </div>
  {% endfor %}
</div>

<div class="lightbox" id="lightbox">
  <span class="lightbox__close" id="lightbox-close">&times;</span>
  <div><img src="" alt="" id="lightbox-img" class="lightbox__img"></div>
  <div class="lightbox__caption" id="lightbox-caption"></div>
</div>

{% if site.data.photos.size == 0 %}
<div class="panel empty"><p>还没有照片，快去添加吧！</p></div>
{% endif %}
