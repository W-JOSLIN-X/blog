<!-- 个人信息卡片 -->
<div class="glass-card profile-card fade-in-item">
  <a href="{{ '/about' | relative_url }}" class="profile-avatar">
    <img src="{{ '/assets/images/avatar.jpg' | relative_url }}" alt="头像">
    <div class="avatar-placeholder">👤</div>
  </a>
  <div class="profile-name">{{ site.author }}</div>
  <div class="profile-bio">{{ site.description }}</div>
  <div class="profile-stats">
    <div class="profile-stat">
      <div class="profile-stat-num">{{ site.posts.size }}</div>
      <div class="profile-stat-label">文章</div>
    </div>
    <div class="profile-stat">
      <div class="profile-stat-num">{{ site.data.photos.size }}</div>
      <div class="profile-stat-label">照片</div>
    </div>
    <div class="profile-stat">
      <div class="profile-stat-num">{{ site.data.projects.size }}</div>
      <div class="profile-stat-label">项目</div>
    </div>
  </div>
  <div class="profile-social">
    <a href="https://github.com/haop11" target="_blank" title="GitHub">🐙</a>
    <a href="mailto:{{ site.email }}" title="邮箱">📧</a>
    <a href="#" title="QQ" onclick="alert('QQ: 3044779172');return false;">💬</a>
  </div>
</div>

<!-- 导航卡片 -->
<div class="glass-card nav-card fade-in-item">
  <a href="{{ '/' | relative_url }}" class="{% if page.url == '/' %}active{% endif %}">
    <span class="nav-icon">🏠</span> 首页
  </a>
  <a href="{{ '/photos' | relative_url }}" class="{% if page.url contains 'photos' %}active{% endif %}">
    <span class="nav-icon">📷</span> 照片墙
  </a>
  <a href="{{ '/thoughts' | relative_url }}" class="{% if page.url contains 'thoughts' %}active{% endif %}">
    <span class="nav-icon">💬</span> 说说
  </a>
  <a href="{{ '/projects' | relative_url }}" class="{% if page.url contains 'projects' %}active{% endif %}">
    <span class="nav-icon">🚀</span> 项目
  </a>
  <a href="{{ '/about' | relative_url }}" class="{% if page.url contains 'about' %}active{% endif %}">
    <span class="nav-icon">👤</span> 关于
  </a>
</div>
