<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body{% if site.bg_image %} style="--page-bg: url('{{ site.bg_image | relative_url }}');"{% endif %}>

  <!-- 全站统一背景图层 -->
  <div class="page-bg"></div>

  <!-- 粒子背景 -->
  <div class="particles-bg" id="particles-bg"></div>

  <header class="site-header">
    <div class="container">
      <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">🏠 首页</a>
        <a href="{{ '/photos' | relative_url }}">📷 照片墙</a>
        <a href="{{ '/thoughts' | relative_url }}">💬 说说</a>
        <a href="{{ '/projects' | relative_url }}">🚀 项目</a>
        <a href="{{ '/about' | relative_url }}">👤 关于</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-links">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/photos' | relative_url }}">照片墙</a>
        <a href="{{ '/thoughts' | relative_url }}">说说</a>
        <a href="{{ '/projects' | relative_url }}">项目</a>
        <a href="{{ '/about' | relative_url }}">关于</a>
      </div>
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. Powered by <a href="https://jekyllrb.com" target="_blank">Jekyll</a> &amp; <a href="https://pages.github.com" target="_blank">GitHub Pages</a>.</p>
    </div>
  </footer>

  <!-- 回到顶部 -->
  <button class="back-to-top" id="back-to-top" title="回到顶部">↑</button>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
