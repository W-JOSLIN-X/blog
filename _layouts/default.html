<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&amp;display=swap" rel="stylesheet">
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="sidebar__inner">
      <div class="sidebar__profile">
        <a class="sidebar__avatar" href="{{ '/about/' | relative_url }}">
          <img src="{{ '/assets/images/9c5bcbb8f7f8daf40fef136246fc0430.jpg' | relative_url }}" alt="{{ site.author }}">
        </a>
        <div class="sidebar__name">{{ site.author }}</div>
        <div class="sidebar__bio">{{ site.description }}</div>
      </div>

      <nav class="sidebar__nav">
        <a href="{{ '/' | relative_url }}"><span class="nav-dot"></span> 首页</a>
        <a href="{{ '/articles/' | relative_url }}"><span class="nav-dot"></span> 文章</a>
        <a href="{{ '/gallery/' | relative_url }}"><span class="nav-dot"></span> 画廊</a>
        <a href="{{ '/fragments/' | relative_url }}"><span class="nav-dot"></span> 碎片</a>
        <a href="{{ '/works/' | relative_url }}"><span class="nav-dot"></span> 作品</a>
        <a href="{{ '/about/' | relative_url }}"><span class="nav-dot"></span> 关于</a>
      </nav>

      <div class="sidebar__bottom">
        <button class="theme-toggle" id="theme-toggle">
          <span class="theme-toggle__icon">&#x263E;</span> 切换主题
        </button>
        <div class="sidebar__social">
          <a href="https://github.com/W-JOSLIN-X" target="_blank" title="GitHub">&#x1f419;</a>
          <a href="#" onclick="copyText('{{ site.email }}');return false;" title="邮箱">&#x1f4e7;</a>
          <a href="#" onclick="copyText('3044779172');return false;" title="QQ">&#x1f4ac;</a>
        </div>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="main__inner">
      {{ content }}
    </div>
  </main>

</div>

<button class="back-top" id="back-top" aria-label="回到顶部">&uarr;</button>

<script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
