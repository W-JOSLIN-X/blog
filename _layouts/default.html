<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      <nav class="topbar__nav">
        <a href="{{ '/' | relative_url }}">首页</a>
        <a href="{{ '/photos' | relative_url }}">照片</a>
        <a href="{{ '/thoughts' | relative_url }}">说说</a>
        <a href="{{ '/essays' | relative_url }}">随笔</a>
        <a href="{{ '/projects' | relative_url }}">项目</a>
        <a href="{{ '/about' | relative_url }}">关于</a>
      </nav>
    </div>
  </header>

  <main class="l-wrap">
    {{ content }}
  </main>

  <footer class="site-foot">
    <div class="site-foot__links">
      <a href="{{ '/' | relative_url }}">首页</a>
      <a href="{{ '/photos' | relative_url }}">照片</a>
      <a href="{{ '/thoughts' | relative_url }}">说说</a>
      <a href="{{ '/essays' | relative_url }}">随笔</a>
      <a href="{{ '/projects' | relative_url }}">项目</a>
      <a href="{{ '/about' | relative_url }}">关于</a>
    </div>
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.author }}. Powered by <a href="https://jekyllrb.com" target="_blank">Jekyll</a> &amp; <a href="https://pages.github.com" target="_blank">GitHub Pages</a>.</p>
  </footer>

  <button class="back-top" id="back-top" aria-label="回到顶部">&uarr;</button>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
