---
layout: default
---

<article>
  <div class="panel" style="padding:32px;">
    <header class="article__header">
      <h1 class="article__title">{{ page.title }}</h1>
      <div class="article__meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%Y 年 %m 月 %d 日" }}</time>
        {% if page.category %}
        <span class="entry__cat" style="margin-left:12px;">{{ page.category }}</span>
        {% endif %}
      </div>
    </header>
    <div class="article__body">
      {{ content }}
    </div>
  </div>
  <div class="article__back">
    <a href="{{ '/essays' | relative_url }}">&larr; 返回随笔列表</a>
  </div>
</article>
