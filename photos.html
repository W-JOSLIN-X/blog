---
layout: default
title: 照片墙
---

<div class="page-intro fade-in-section">
  <h1 class="page-title">📷 照片墙</h1>
  <p class="page-subtitle">用镜头记录生活的每一个瞬间</p>
</div>

<div class="photo-filters">
  <button class="filter-btn active" data-filter="all">全部</button>
  <button class="filter-btn" data-filter="风景">风景</button>
  <button class="filter-btn" data-filter="城市">城市</button>
  <button class="filter-btn" data-filter="旅行">旅行</button>
  <button class="filter-btn" data-filter="自然">自然</button>
  <button class="filter-btn" data-filter="生活">生活</button>
  <button class="filter-btn" data-filter="动物">动物</button>
</div>

<div class="photo-grid" id="photos-grid">
  {% for photo in site.data.photos %}
  <div class="photo-card-h fade-in-item" data-category="{{ photo.category }}" onclick="openLightbox(this)" data-title="{{ photo.title }}" data-desc="{{ photo.desc }}">
    <img src="{{ photo.url | relative_url }}" alt="{{ photo.title }}" loading="lazy">
    <div class="photo-placeholder-bg" style="background:linear-gradient(135deg,rgba(120,80,200,.3),rgba(59,130,246,.2));">🖼️</div>
    <div class="photo-overlay">
      <span class="photo-info-text">{{ photo.title }}{% if photo.desc %} — {{ photo.desc }}{% endif %}</span>
    </div>
  </div>
  {% endfor %}
</div>

<div class="lightbox" id="lightbox">
  <span class="lightbox-close" id="lightbox-close">&times;</span>
  <div class="lightbox-content">
    <img src="" alt="" id="lightbox-img" style="display:none;">
    <div class="lightbox-placeholder" id="lightbox-placeholder">
      <span>🖼️</span>
      <p>点击照片查看大图</p>
    </div>
  </div>
  <div class="lightbox-caption" id="lightbox-caption"></div>
</div>

<script>
function openLightbox(el) {
  var lb = document.getElementById('lightbox');
  var img = document.getElementById('lightbox-img');
  var placeholder = document.getElementById('lightbox-placeholder');
  var caption = document.getElementById('lightbox-caption');
  var srcImg = el.querySelector('img');
  var title = el.getAttribute('data-title') || '';
  var desc = el.getAttribute('data-desc') || '';
  caption.textContent = title + (desc ? ' — ' + desc : '');
  if (srcImg && srcImg.src && srcImg.naturalWidth > 0) {
    img.src = srcImg.src;
    img.style.display = '';
    placeholder.style.display = 'none';
  } else {
    img.style.display = 'none';
    placeholder.style.display = '';
  }
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}
document.getElementById('lightbox-close').addEventListener('click', function(){
  document.getElementById('lightbox').classList.remove('active');
  document.body.style.overflow = '';
});
document.getElementById('lightbox').addEventListener('click', function(e){
  if(e.target === this) {
    this.classList.remove('active');
    document.body.style.overflow = '';
  }
});
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape') {
    document.getElementById('lightbox').classList.remove('active');
    document.body.style.overflow = '';
  }
});
</script>
